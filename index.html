<!doctype html>
<html>
  <head>
    <title>Task Manager</title>

    <style>
      body {
        font-family: Arial;
        background: #0f172a;
        color: white;
        padding: 20px;
        text-align: center;
      }

      input,
      button {
        padding: 8px;
        margin: 5px;
      }

      .hidden {
        display: none;
      }

      table {
        width: 100%;
        margin-top: 20px;
        border-collapse: collapse;
      }

      td,
      th {
        border: 1px solid #555;
        padding: 10px;
        text-align: center;
      }

      .completed {
        color: lightgreen;
      }

      #loader {
        display: none;
        font-size: 20px;
      }
    </style>
  </head>

  <body>
    <h2>Task Manager 🤖</h2>

    <!-- ================= LOGIN ================= -->
    <div id="login-box">
      <h3>Login</h3>
      <input id="login-email" placeholder="Email" /><br />
      <input id="login-password" type="password" placeholder="Password" /><br />
      <button onclick="login()">Login</button>
      <p>Don't have account? <button onclick="showSignup()">Signup</button></p>
    </div>

    <!-- ================= SIGNUP ================= -->
    <div id="signup-box" class="hidden">
      <h3>Signup</h3>
      <input id="signup-name" placeholder="Name" /><br />
      <input id="signup-email" placeholder="Email" /><br />
      <input
        id="signup-password"
        type="password"
        placeholder="Password"
      /><br />
      <button onclick="signup()">Signup</button>
      <p>Already have account? <button onclick="showLogin()">Login</button></p>
    </div>

    <!-- ================= TASK APP ================= -->
    <div id="app" class="hidden">
      <button onclick="logout()">Logout</button>

      <input id="title" placeholder="Task Title" oninput="suggestTask()" />
      <button onclick="addTask()">Add</button>

      <p id="suggestion"></p>
      <h3 id="ai-message"></h3>

      <div id="loader">⏳ Loading...</div>

      <table>
        <thead>
          <tr>
            <th>Task</th>
            <th>Date</th>
            <th>Status</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="list"></tbody>
      </table>
    </div>

    <script>
      const API = "http://localhost:5000"; // change if deployed

      // ================= PAGE SWITCH =================
      function showSignup() {
        document.getElementById("login-box").classList.add("hidden");
        document.getElementById("signup-box").classList.remove("hidden");
      }

      function showLogin() {
        document.getElementById("signup-box").classList.add("hidden");
        document.getElementById("login-box").classList.remove("hidden");
      }

      // ================= SIGNUP =================
      async function signup() {
        let name = document.getElementById("signup-name").value;
        let email = document.getElementById("signup-email").value;
        let password = document.getElementById("signup-password").value;

        await fetch(API + "/signup", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, email, password }),
        });

        alert("Signup success");
        showLogin();
      }

      // ================= LOGIN =================
      async function login() {
        let email = document.getElementById("login-email").value;
        let password = document.getElementById("login-password").value;

        let res = await fetch(API + "/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password }),
        });

        let data = await res.json();

        if (data.user) {
          localStorage.setItem("user", JSON.stringify(data.user));

          document.getElementById("login-box").classList.add("hidden");
          document.getElementById("app").classList.remove("hidden");

          loadTasks();
        } else {
          alert(data.error);
        }
      }

      // ================= LOGOUT =================
      function logout() {
        localStorage.removeItem("user");
        location.reload();
      }

      // ================= CHECK LOGIN =================
      window.onload = () => {
        let user = localStorage.getItem("user");

        if (user) {
          document.getElementById("login-box").classList.add("hidden");
          document.getElementById("app").classList.remove("hidden");
          loadTasks();
        }
      };

      // ================= LOADER =================
      function showLoader(show) {
        document.getElementById("loader").style.display = show
          ? "block"
          : "none";
      }

      // ================= ADD TASK =================
      async function addTask() {
        let title = document.getElementById("title").value.trim();

        if (!title) return alert("Enter task");

        showLoader(true);

        await fetch(API + "/add-task", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ title }),
        });

        document.getElementById("title").value = "";
        loadTasks();
      }

      // ================= LOAD TASKS =================
      async function loadTasks() {
        showLoader(true);

        let res = await fetch(API + "/tasks");
        let tasks = await res.json();

        let list = document.getElementById("list");
        list.innerHTML = "";

        let total = tasks.length;
        let completed = 0;

        tasks.forEach((t) => {
          if (t.status === "completed") completed++;

          list.innerHTML += `
      <tr>
        <td>${t.title}</td>
        <td>${t.created_at.split("T")[0]}</td>
        <td class="${t.status === "completed" ? "completed" : ""}">
          ${t.status}
        </td>
        <td>
          <button onclick="toggle('${t._id}')">Toggle</button>
          <button onclick="removeTask('${t._id}')">Delete</button>
        </td>
      </tr>
    `;
        });

        showAIMessage(total, completed);
        showLoader(false);
      }

      // ================= TOGGLE =================
      async function toggle(id) {
        await fetch(API + "/toggle/" + id, { method: "PUT" });
        loadTasks();
      }

      // ================= DELETE =================
      async function removeTask(id) {
        await fetch(API + "/delete/" + id, { method: "DELETE" });
        loadTasks();
      }

      // ================= AI =================
      function suggestTask() {
        let text = document.getElementById("title").value.toLowerCase();
        let suggestion = "";

        if (text.includes("study")) suggestion = "📚 Break into sessions";
        else if (text.includes("gym")) suggestion = "💪 Stay consistent";

        document.getElementById("suggestion").innerText = suggestion;
      }

      function showAIMessage(total, completed) {
        let rate = total === 0 ? 0 : (completed / total) * 100;

        let msg =
          rate > 80 ? "🔥 Excellent" : rate > 50 ? "👍 Good" : "⚠️ Improve";

        document.getElementById("ai-message").innerText = msg;
      }
    </script>
  </body>
</html>
